spring.application.name=ai-commerce

#MySQL DB
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# poll size
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=2

spring.datasource.hikari.max-lifetime=1700000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.keepalive-time=300000

# ??? ??/?? ?? ??
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000


#JPA ??
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.type.descriptor.sql=trace


# Redis
#spring.data.redis.sentinel.master=${SPRING_REDIS_SENTINEL_MASTER}
#spring.data.redis.sentinel.nodes=${SPRING_REDIS_SENTINEL_NODES}

# Batch
spring.batch.job.enabled=false
spring.batch.jdbc.initialize-schema=always

# ElasticSearch
# local
spring.elasticsearch.uris=http://localhost:9200
#servier
#spring.elasticsearch.uris=http://elastic:9200
#logging.level.org.elasticsearch.client=TRACE
spring.data.elasticsearch.repositories.enabled=true


# Local
spring.data.redis.host=localhost
spring.data.redis.port=6379

#aws
cloud.aws.credentials.access-key=${AWS_ACCESS_KEY}
cloud.aws.credentials.secret-key=${AWS_SECRET_KEY}
cloud.aws.region.static=ap-northeast-2
cloud.aws.s3.bucket=ram-product-bucket
cloud.aws.stack.auto=false

#jwt
jwt.secret=${jwt.secret}
jwt.refresh.expiration=${jwt.refresh.expiration}
jwt.access.expiration=${jwt.access.expiration}

# Weather API
weather.apiKey = ${weather.apiKey}

# OpenAI
spring.ai.openai.api-key = ${spring.ai.openai.api-key}
spring.ai.openai.embedding.model=${spring.ai.openai.embedding.model}
